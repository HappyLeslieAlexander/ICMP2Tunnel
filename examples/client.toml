listen_addr = "127.0.0.1:1080"
server_addr = "203.0.113.10"
# IPv6 server example:
# server_addr = "2001:db8::10"
# IPv6 link-local server example:
# server_addr = "fe80::1%eth0"
psk = "replace-with-a-long-random-psk"
salt = "icmp2tunnel-v1-lab"
log_level = "info"
allow_non_loopback = false
poll_interval_ms = 20
request_timeout_ms = 1000
retries = 3
max_payload = 900
handshake_timeout_ms = 5000
open_timeout_ms = 10000
max_local_clients = 64
# Required when listen_addr is not loopback.
# socks_username = "operator"
# socks_password = "replace-with-a-long-random-password"
# Optional fixed ICMP identifier; default derives from process id.
# icmp_identifier = 4242
