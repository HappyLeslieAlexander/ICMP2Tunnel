name: Fuzz

on:
  workflow_dispatch:

jobs:
  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: frame_decode (smoke)
        run: cd fuzz && cargo fuzz run frame_decode -- -max_total_time=20 -dict=dictionary.txt
      - name: socks_decode (smoke)
        run: cd fuzz && cargo fuzz run socks_decode -- -max_total_time=20
